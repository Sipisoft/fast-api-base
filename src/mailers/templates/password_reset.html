<!DOCTYPE html>
<html>
<head>
    <title>Password Reset</title>
    <style>
        /* Inline CSS here */
        body { font-family: sans-serif;
        background-color: #f9fafb; }
            .container {
                border-radius: 5px;
                
                margin: 20px auto;
                border: 1px solid #e4e7ec;
                max-width: 720px;
                background-color: #fff}
            .header {
                padding: 20px;
                text-align: center;
                background-color: #00bcb4;
                color: #fff;
                border-top-left-radius: 5px;
                border-top-right-radius: 5px;
            }
            .content {
                padding: 20px;
            }
            .footer {
                padding: 20px;
               
                text-align: center;
                background-color: #0e2943;
                color: #9e9e9e;
                border-bottom-left-radius: 5px;
                border-bottom-right-radius: 5px;
            }
            .btn {
                background-color: #028382;
                color: #fff;
                border: none;
                padding: 10px 20px;
                border-radius: 5px;
                cursor: pointer;
                transition: background-color 0.3s ease;
            }
    </style>
</head>
<body>
    <div class='container'>
        <div class="header">
            <img src="{{ request.url_for('static', path='images/logo.png') }}" alt="FastAPI">
        </div>
        <div class="content">
        <h1>Hello, {{ admin.name }}!</h1>
        <p>{{'Kindly use the link below to set you password' if new_password else 'Please use the link below to reset your password'}}</p>
        
       <a class='btn' href="{{link}}">{{'Set' if new_password else 'Reset' }} Password</a>
        </div>
    <div class="footer">Powered by Sipisoft</div>
    </div>
</body>
</html>
